apiVersion: 1

groups:
  - orgId: 1
    name: "Flask-O-Shop Incidents"
    folder: "Incident Response"
    interval: 1m
    rules:
      # 1. Service down
      - uid: "alert-service-down"
        title: "Service down"
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus-ds
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: 'up{job="flask-app"}'
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              refId: B
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            model:
              type: math
              refId: C
              expression: $B == 0
        noDataState: Alerting
        for: 1m
        labels:
          severity: critical
          component: web
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "Prometheus cannot scrape the Flask app metrics."
          incident_payload: >
            {
              "incident_type": "service_down",
              "target_service": "{{ $labels.job }}",
              "action_required": "Find dependent services"
            }

      # 2. High latency
      - uid: "alert-high-latency"
        title: "High latency"
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus-ds
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: 'histogram_quantile(0.95, sum(rate(http_server_duration_milliseconds_bucket{job="flask-app"}[5m])) by (le, http_target))'
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              refId: B
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            model:
              type: math
              refId: C
              expression: $B > 1000
        noDataState: OK
        for: 2m
        labels:
          severity: high
          component: web
        annotations:
          summary: "High API Latency on {{ $labels.http_target }}"
          description: "p95 latency is {{ $values.B.Value | printf \"%.0f\" }}ms (Threshold > 1000ms)."
          incident_payload: >
            {
              "incident_type": "high_latency",
              "target_endpoint": "{{ $labels.http_target }}",
              "current_latency_ms": {{ $values.B.Value | printf "%.0f" }},
              "action_required": "Use Jaeger traces to identify slow spans"
            }

      # 3. High 5xx rate
      - uid: "alert-high-5xx"
        title: "High 5xx rate"
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus-ds
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: 'sum by (http_target) (rate(http_server_duration_milliseconds_count{job="flask-app", http_status_code=~"5.."}[5m])) / sum by (http_target) (rate(http_server_duration_milliseconds_count{job="flask-app"}[5m]))'
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              refId: B
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            model:
              type: math
              refId: C
              expression: $B > 0.05
        noDataState: OK
        for: 2m
        labels:
          severity: critical
          component: web
        annotations:
          summary: "High 5xx Error Rate on {{ $labels.http_target }}"
          description: "Error rate is {{ $values.B.Value | printf \"%.2f\" }} (Threshold > 0.05)."
          incident_payload: >
            {
              "incident_type": "high_5xx_rate",
              "target_endpoint": "{{ $labels.http_target }}",
              "error_rate": {{ $values.B.Value | printf "%.2f" }},
              "action_required": "Correlate with logs/traces"
            }

      # 4. Database slow
      - uid: "alert-database-slow"
        title: "Database slow"
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus-ds
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: 'histogram_quantile(0.95, sum(rate(db_client_duration_milliseconds_bucket{job="flask-app"}[5m])) by (le))'
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              refId: B
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            model:
              type: math
              refId: C
              expression: $B > 500
        noDataState: OK
        for: 2m
        labels:
          severity: high
          component: database
        annotations:
          summary: "Database queries are slow"
          description: "p95 database query latency is {{ $values.B.Value | printf \"%.0f\" }}ms."
          incident_payload: >
            {
              "incident_type": "database_slow",
              "current_latency_ms": {{ $values.B.Value | printf "%.0f" }},
              "action_required": "Link DB node to affected services"
            }

      # 5. Redis down
      - uid: "alert-redis-down"
        title: "Redis down"
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus-ds
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: 'up{job="redis"}'
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              refId: B
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            model:
              type: math
              refId: C
              expression: $B == 0
        noDataState: Alerting
        for: 1m
        labels:
          severity: high
          component: cache
        annotations:
          summary: "Redis Cache is down"
          description: "Redis is unreachable."
          incident_payload: >
            {
              "incident_type": "redis_down",
              "action_required": "Identify cache-dependent services"
            }

      # 6. External API slow
      - uid: "alert-external-api-slow"
        title: "External API slow"
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus-ds
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: 'histogram_quantile(0.95, sum(rate(http_client_duration_milliseconds_bucket{job="flask-app"}[5m])) by (le, http_url))'
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              refId: B
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            model:
              type: math
              refId: C
              expression: $B > 2000
        noDataState: OK
        for: 2m
        labels:
          severity: high
          component: external
        annotations:
          summary: "External API {{ $labels.http_url }} is slow"
          description: "p95 latency is {{ $values.B.Value | printf \"%.0f\" }}ms."
          incident_payload: >
            {
              "incident_type": "external_api_slow",
              "target_url": "{{ $labels.http_url }}",
              "current_latency_ms": {{ $values.B.Value | printf "%.0f" }},
              "action_required": "Show dependency impact"
            }

      # 7. Queue backlog
      - uid: "alert-queue-backlog"
        title: "Queue backlog"
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus-ds
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: 'rabbitmq_queue_messages_ready{queue="tasks"}'
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              refId: B
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            model:
              type: math
              refId: C
              expression: $B > 1000
        noDataState: OK
        for: 5m
        labels:
          severity: medium
          component: queue
        annotations:
          summary: "Queue backlog on {{ $labels.queue }}"
          description: "Queue has {{ $values.B.Value | printf \"%.0f\" }} messages pending."
          incident_payload: >
            {
              "incident_type": "queue_backlog",
              "target_queue": "{{ $labels.queue }}",
              "pending_messages": {{ $values.B.Value | printf "%.0f" }},
              "action_required": "Identify stalled consumers"
            }

      # 8. CPU/Memory exhaustion
      - uid: "alert-cpu-exhaustion"
        title: "CPU/Memory exhaustion"
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus-ds
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: 'rate(process_cpu_seconds_total{job="flask-app"}[5m])'
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              refId: B
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            model:
              type: math
              refId: C
              expression: $B > 0.8
        noDataState: OK
        for: 5m
        labels:
          severity: medium
          component: infra
        annotations:
          summary: "High CPU Usage on {{ $labels.job }}"
          description: "CPU usage is {{ $values.B.Value | printf \"%.2f\" }}."
          incident_payload: >
            {
              "incident_type": "cpu_exhaustion",
              "target_service": "{{ $labels.job }}",
              "cpu_rate": {{ $values.B.Value | printf "%.2f" }},
              "action_required": "Correlate with service degradation"
            }

      # 9. Payment success drop
      - uid: "alert-payment-success-drop"
        title: "Payment success drop"
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus-ds
            relativeTimeRange: { from: 600, to: 0 }
            model:
              expr: 'sum(rate(http_server_duration_milliseconds_count{job="flask-app", http_target="/payment_success"}[10m]))'
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              refId: B
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            model:
              type: math
              refId: C
              expression: $B == 0
        noDataState: Alerting
        for: 5m
        labels:
          severity: critical
          component: billing
        annotations:
          summary: "Zero Payment Successes"
          description: "No successful payments detected in the last 10 minutes."
          incident_payload: >
            {
              "incident_type": "payment_success_drop",
              "target_endpoint": "/payment_success",
              "action_required": "Estimate business impact"
            }
